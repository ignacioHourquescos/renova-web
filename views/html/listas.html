<body>

<!-- CABECERA -->
<div class="container-fluid cabecera">
	<h1 id="nombreLista">Lista De Precios</h1>
</div>

<!-- SECCION LOGIN -->
<section id="loginSection" class="login-section">
	<div id="verificandoCredenciales" class="login-page" style="display:none; flex-direction:column; align-items:center; justify-content:center;">
		<p style="color:#333; font-size:1.2rem; margin-bottom:1rem;">Verificando credenciales...</p>
		<div class="spinner-border" role="status">
			<span class="sr-only" style="color:black;">Cargando...</span>
		</div>
	</div>
	<div id="loginFormContainer" class="login-page">
		<form id="formListaLogin" class="login-form" onsubmit="loginYCargarLista(event)">
			<label class="login-label" for="numCliente">Número de Cliente *</label>
			<input id="numCliente" type="text" placeholder="Ej: 9291" required autocomplete="off" />
			<label class="login-label" for="cuit">Número de CUIT sin guiones *</label>
			<input id="cuit" type="text" placeholder="11 dígitos" required />
			<button type="submit" id="btnLogin" class="login-btn login-btn-primary">Iniciar sesión</button>

			<a href="listas.html?explorar=1"
			   class="login-btn login-btn-secondary login-btn-highlight"
			   onclick="try{localStorage.setItem('renova_cliente_restringido','1')}catch(e){}">
			   Explorar productos sin cuenta
			</a>

			<a href="../../index.html" class="login-btn login-btn-secondary login-btn-ghost">← Volver a inicio</a>

			<p id="errorMsg" class="login-error"></p>
		</form>
	</div>
</section>

<!-- SECCION TARJETAS DE MARCAS (visible después del login) -->
<section id="listasSection" style="display:none;">
	<div class="competenciaPlantilla competencia" style="display:none;">
		<div class="card" id="card1">
			<a class="link2" style="position:absolute; top:0;right:0;width:100%; height:100%;background-color:transparent; display:block" href="listaEspecifica2.html?id="></a>
			<h2><a class="link titulo" href="listaEspecifica2.html?id="></a></h2>
			<h3 class="mes" style="color:rgb(211, 213, 186)"></h3>
			<h3 class="mes2" style="font-size:2rem"></h3>
			<h3 class="aumento" style="color:rgb(243, 243, 243); font-size:1rem"></h3>
		</div>
	</div>

	<div class="competencias"></div>

	<div class="spinner-border" id="spinnerListas" role="status">
		<span class="sr-only" style="color:black;">Loading...</span>
	</div>
</section>

</body>

<script src="../js/src/plugins.js"></script>
<script src="../js/src/main.js"></script>
<script src="../js/listasService.js"></script>
